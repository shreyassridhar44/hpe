<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal | HPE</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-border: #222222;
            --primary: #01A982; /* HPE Green */
            --primary-hover: #008868;
            --text: #ffffff;
            --text-muted: #888888;
            --danger: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #01A98215, transparent 50%);
        }

        .login-container {
            background-color: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--primary);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background-color: var(--primary);
            border-radius: 6px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .title {
            text-align: center;
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border: 1px solid var(--surface-border);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(1, 169, 130, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background-color: rgba(255, 74, 74, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 74, 74, 0.2);
            display: block;
        }

        .alert-success {
            background-color: rgba(1, 169, 130, 0.1);
            color: var(--primary);
            border: 1px solid rgba(1, 169, 130, 0.2);
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .api-config {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            padding: 15px;
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            font-size: 12px;
            width: 300px;
        }

        .api-config input {
            width: 100%;
            margin-top: 8px;
            padding: 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <div class="logo-box"></div>
            <div class="logo-text">HPE</div>
        </div>
        
        <h1 class="title" id="formTitle">Enterprise Portal</h1>
        <p class="subtitle" id="formSubtitle">Sign in to access your workspace</p>

        <div id="alertBox" class="alert"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="e.g. alice, bob" required>
            </div>
            <div class="form-group" id="deptGroup" style="display: none;">
                <label for="department">Department</label>
                <input type="text" id="department" class="form-control" placeholder="e.g. Engineering, Sales">
            </div>
            <div class="form-group" id="passGroup">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="btn">Sign In</button>
        </form>

        <div class="footer">
            <p id="toggleText">Don't have an account? <a href="#" id="toggleMode" style="color: var(--primary); text-decoration: none;">Register here</a></p>
            <div style="margin-top: 15px; opacity: 0.5;">HPE Enterprise Security Demo</div>
        </div>

    </div>

    <!-- For Ngrok Configuration when hosted on Render -->
    <div class="api-config">
        <label style="color: #888">Backend API URL (e.g. Ngrok Tunnel)</label>
        <input type="text" id="apiUrl" value="" placeholder="Automatic (uses current host)">
    </div>

    <script src="app.js"></script>
</body>
</html>
