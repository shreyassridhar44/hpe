# Frontend — 2 replicas, load-balanced by K8s Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hpe
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: hpe-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
