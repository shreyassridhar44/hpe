apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: hpe
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
        - name: wait-for-es
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Elasticsearch..."
              until nc -z elasticsearch.hpe.svc.cluster.local 9200; do sleep 3; done
              echo "Elasticsearch ready"
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.15.0
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch.hpe.svc.cluster.local:9200"
            - name: SERVER_PUBLICBASEURL
              value: "http://localhost:5601"
            - name: XPACK_SECURITY_ENABLED
              value: "false"
            - name: TELEMETRY_ENABLED
              value: "false"
          ports:
            - containerPort: 5601
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10