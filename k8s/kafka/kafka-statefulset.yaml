# 2-broker Kafka KRaft cluster — fault tolerance + replication_factor=2
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: hpe
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          command:
            - sh
            - -c
            - |
              # Extract pod ordinal from hostname (kafka-0 → 0, kafka-1 → 1)
              export KAFKA_NODE_ID=${HOSTNAME##*-}
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless.hpe.svc.cluster.local:9092"
              echo "Waiting 15s for CoreDNS to register hostnames..."
              sleep 15
              # Run the official entrypoint
              /etc/kafka/docker/run
          env:
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-headless.hpe.svc.cluster.local:9093,1@kafka-1.kafka-headless.hpe.svc.cluster.local:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "2"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "2"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: CLUSTER_ID
              value: "ciWo7IWazngRchmPES6q5A"
            # Slim JVM heap for dev
            - name: KAFKA_HEAP_OPTS
              value: "-Xms128m -Xmx256m"
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          resources:
            requests:
              memory: "300Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
