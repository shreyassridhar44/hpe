# Vault server mode with Raft storage — persistent across restarts
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: hpe
  labels:
    app: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15.6
          command: ["vault", "server", "-config=/vault/config/vault.hcl"]
          env:
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
            - name: VAULT_API_ADDR
              value: "http://vault.hpe.svc.cluster.local:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "http://vault.hpe.svc.cluster.local:8201"
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-config
              mountPath: /vault/config
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Initialized|Sealed'"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Initialized|Sealed'"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-data
