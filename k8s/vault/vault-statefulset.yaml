# Vault server mode with Raft storage — persistent across restarts
# The unseal-watcher sidecar automatically unseals Vault whenever the pod
# restarts (e.g. after minikube stop/start), eliminating the need for
# manual `vault operator unseal` commands.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: hpe
  labels:
    app: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault-sa
      containers:
        # ── Primary Vault server container ─────────────────────────────────
        - name: vault
          image: hashicorp/vault:1.15.6
          command: ["vault", "server", "-config=/vault/config/vault.hcl"]
          env:
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
            - name: VAULT_API_ADDR
              value: "http://vault.hpe.svc.cluster.local:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "http://vault.hpe.svc.cluster.local:8201"
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-config
              mountPath: /vault/config
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Initialized|Sealed'"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Initialized|Sealed'"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5

        # ── unseal-watcher sidecar ─────────────────────────────────────────
        # Both containers share the same network namespace (same pod), so
        # 127.0.0.1:8200 reaches the Vault container directly without going
        # through any Service — no token or auth needed for the unseal API.
        #
        # Security posture:
        #   - Mounts vault-data PVC as readOnly: true — only reads the key
        #   - Does NOT have access to the root token or AppRole credentials
        #   - Only calls /v1/sys/unseal — cannot read or write any secrets
        #   - The unseal key alone cannot decrypt Vault data without the
        #     encrypted storage backend (Raft on PVC)
        #
        # Behaviour:
        #   - Polls vault status every 15 seconds
        #   - If sealed (exit code 2) → reads key from PVC → calls unseal API
        #   - If unsealed (exit code 0) → silent no-op
        #   - If API unreachable → logs and retries (Vault still booting)
        #   - Waits for the key file before attempting anything (first-boot
        #     safety: vault-init Job hasn't run yet on a brand new cluster)
        - name: unseal-watcher
          image: hashicorp/vault:1.15.6
          command:
            - sh
            - -c
            - |
              VAULT_ADDR="http://127.0.0.1:8200"
              UNSEAL_KEY_FILE="/vault/data/.unseal_key"

              echo "[unseal-watcher] Starting. Polling seal status every 15s."
              echo "[unseal-watcher] Key file expected at: $UNSEAL_KEY_FILE"

              while true; do
                sleep 15

                # ── Safety gate: wait for vault-init Job to complete ──────
                # On a brand new cluster the key file does not exist yet.
                # Don't attempt anything until vault-init writes it.
                if [ ! -f "$UNSEAL_KEY_FILE" ]; then
                  echo "[unseal-watcher] Key file not found yet — vault-init Job may still be running. Waiting..."
                  continue
                fi

                # ── Check current seal status ─────────────────────────────
                # vault status exit codes:
                #   0 = unsealed and healthy
                #   1 = error (API unreachable, local socket issue)
                #   2 = sealed
                vault status -address="$VAULT_ADDR" > /dev/null 2>&1
                STATUS=$?

                if [ "$STATUS" -eq 2 ]; then
                  echo "[unseal-watcher] Vault is SEALED — attempting auto-unseal..."
                  UNSEAL_KEY=$(cat "$UNSEAL_KEY_FILE")

                  RESULT=$(wget -qO- \
                    --header="Content-Type: application/json" \
                    --post-data="{\"key\":\"$UNSEAL_KEY\"}" \
                    "$VAULT_ADDR/v1/sys/unseal" 2>&1)

                  if echo "$RESULT" | grep -q '"sealed":false'; then
                    echo "[unseal-watcher] Vault unsealed successfully."
                  else
                    echo "[unseal-watcher] Unseal attempt failed. Response: $RESULT"
                    echo "[unseal-watcher] Will retry in 15s."
                  fi

                elif [ "$STATUS" -eq 0 ]; then
                  # Vault is healthy and unsealed — intentional no-op, no log spam
                  :

                else
                  # STATUS=1: API not yet reachable (Vault still starting up)
                  echo "[unseal-watcher] Vault API not reachable (status=$STATUS) — Vault may still be booting. Waiting..."
                fi
              done
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "32Mi"
              cpu: "20m"
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
              readOnly: true   # sidecar only ever reads .unseal_key — never writes

      volumes:
        - name: vault-config
          configMap:
            name: vault-config
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-data