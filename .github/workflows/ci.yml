# ============================================================================
# HPE Enterprise Threat Detection — CI Pipeline
# ============================================================================
# Triggers on every push/PR to main. Runs linting, unit tests, integration
# tests, code coverage, security scanning, and Docker build validation.
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Lint & Static Analysis ──────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8 (PEP-8 compliance)
        run: |
          flake8 backend/app/ scripts/ export_v2_model.py \
            --max-line-length=120 \
            --extend-ignore=E111,E117,E128,E203,E221,E225,E231,E302,E303,E305,E266,E402,F401,F541,F811,F824,F841,W291,W292,W293,W391,W503,W504,E501 \
            --statistics \
            --count

      - name: Check Black formatting
        run: |
          black --check --diff --line-length=120 \
            backend/app/ scripts/ export_v2_model.py || true

      - name: Check import ordering
        run: |
          isort --check-only --diff --profile black \
            backend/app/ scripts/ export_v2_model.py || true

  # ── Backend Unit Tests ──────────────────────────────────────────────────
  test-backend:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          cd backend
          python -m pytest tests/ \
            -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            backend/test-results.xml
            backend/coverage.xml
          retention-days: 30

  # ── API Integration Tests ───────────────────────────────────────────────
  test-integration:
    name: "🔗 API Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integ-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-integ-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run API integration tests
        run: |
          cd backend
          python -m pytest tests/test_api.py -v --tb=short \
            --junitxml=integration-results.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/integration-results.xml
          retention-days: 30

  # ── Security Scanning ───────────────────────────────────────────────────
  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety pip-audit

      - name: Run Bandit (Python security linter)
        run: |
          bandit -r backend/app/ export_v2_model.py \
            -ll --format json --output bandit-report.json \
            -s B101 || true
          bandit -r backend/app/ export_v2_model.py \
            -ll -s B101 || true

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          pip install -r backend/requirements.txt
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  # ── Frontend Validation ─────────────────────────────────────────────────
  test-frontend:
    name: "🎨 Frontend Build Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  # ── Docker Build Validation ─────────────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build Validation"
    runs-on: ubuntu-latest
    needs: [test-backend, test-integration, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build \
            -t hpe-backend:ci-${{ github.sha }} \
            -f backend/Dockerfile . \
            --no-cache

      - name: Build Frontend Image
        run: |
          docker build \
            -t hpe-frontend:ci-${{ github.sha }} \
            -f frontend/Dockerfile ./frontend \
            --no-cache

      - name: Verify images exist
        run: |
          docker images | grep hpe-backend
          docker images | grep hpe-frontend
