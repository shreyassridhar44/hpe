# ============================================================================
# HPE Enterprise Threat Detection — ML Training Pipeline
# ============================================================================
# Runs model training with MLflow tracking when ML code or data changes.
# Validates model performance against a minimum threshold before allowing merge.
# ============================================================================

name: ML Training Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "export_v2_model.py"
      - "dataset/**"
      - "backend/app/inference.py"
      - "backend/requirements.txt"
  pull_request:
    branches: [main]
    paths:
      - "export_v2_model.py"
      - "dataset/**"
      - "backend/app/inference.py"
  workflow_dispatch:    # Allow manual trigger

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
  MIN_F1_THRESHOLD: "0.70"

jobs:
  # ── Model Training & Validation ─────────────────────────────────────────
  train-and-validate:
    name: "🤖 Train & Validate Model"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history for DVC

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-ml-

      - name: Install ML dependencies
        run: |
          pip install xgboost lightgbm scikit-learn pandas numpy joblib imbalanced-learn mlflow dvc

      - name: Pull DVC data (if remote configured)
        run: |
          if [ -f ".dvc/config" ]; then
            dvc pull --force 2>/dev/null || echo "⚠️ DVC remote not configured — will check for data"
          else
            echo "DVC not initialized — will check for data"
          fi

      - name: Check dataset availability
        id: check-data
        run: |
          if [ -f "dataset/updated_realistic_network_logs.csv" ] && [ -f "dataset/updated_realistic_user_profiles.csv" ]; then
            echo "data_available=true" >> $GITHUB_OUTPUT
            echo "✅ Dataset files found"
          else
            echo "data_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Dataset files not found (DVC remote not configured). Skipping training."
            echo "   To fix: configure a DVC remote with 'dvc remote add' and 'dvc push'"
          fi

      - name: Run model training with MLflow
        if: steps.check-data.outputs.data_available == 'true'
        run: |
          python export_v2_model.py
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: "HPE-CI-Training"

      - name: Validate model performance
        if: steps.check-data.outputs.data_available == 'true'
        env:
          MIN_F1_THRESHOLD: ${{ env.MIN_F1_THRESHOLD }}
        run: |
          python -c "
          import os, sys, re

          report_path = 'model_output/classification_report.txt'
          min_f1 = float(os.environ.get('MIN_F1_THRESHOLD', '0.70'))

          # ── 1. Verify all artifacts exist ────────────────────────────────────
          required = [
              'model_output/pipeline_artifacts_v2.joblib',
              'model_output/test_events.json',
              'model_output/user_profiles.json',
              report_path,
          ]
          for path in required:
              if not os.path.exists(path):
                  print(f'FAIL: Missing artifact: {path}')
                  sys.exit(1)
          print('OK: All artifacts present')

          # ── 2. Parse the classification report ───────────────────────────────
          with open(report_path, 'r') as f:
              content = f.read()

          # Extract Threat class F1 score from sklearn classification_report format:
          # '      Threat       0.xx      0.xx      0.xx      NNNN'
          threat_match = re.search(
              r'Threat\s+[\d.]+\s+[\d.]+\s+([\d.]+)\s+\d+', content
          )
          if not threat_match:
              print('FAIL: Could not parse Threat class F1 from classification report')
              print('Report content:')
              print(content)
              sys.exit(1)

          threat_f1 = float(threat_match.group(1))

          # Extract ensemble F1 (macro avg row) as secondary check
          macro_match = re.search(
              r'macro avg\s+[\d.]+\s+[\d.]+\s+([\d.]+)\s+\d+', content
          )
          macro_f1 = float(macro_match.group(1)) if macro_match else None

          # Extract best threshold
          thresh_match = re.search(r'Best Threshold:\s*([\d.]+)', content)
          best_threshold = float(thresh_match.group(1)) if thresh_match else None

          print(f'Threat class F1:  {threat_f1:.4f}')
          print(f'Macro avg F1:     {macro_f1:.4f}' if macro_f1 else 'Macro avg F1: N/A')
          print(f'Best threshold:   {best_threshold:.4f}' if best_threshold else '')
          print(f'Minimum required: {min_f1:.4f}')

          # ── 3. Gate: fail if below threshold ─────────────────────────────────
          if threat_f1 < min_f1:
              print(f'')
              print(f'FAIL: Threat class F1 ({threat_f1:.4f}) is below minimum threshold ({min_f1:.4f})')
              print(f'The model is not performing well enough to be deployed.')
              print(f'Check training data quality, feature engineering, or hyperparameters.')
              sys.exit(1)

          print(f'')
          print(f'PASS: Model meets performance requirements (F1={threat_f1:.4f} >= {min_f1:.4f})')
          "

      - name: Write model performance summary
        if: steps.check-data.outputs.data_available == 'true'
        env:
          MIN_F1_THRESHOLD: ${{ env.MIN_F1_THRESHOLD }}
        run: |
          python -c "
          import re, os

          with open('model_output/classification_report.txt', 'r') as f:
              content = f.read()

          threat_f1   = re.search(r'Threat\s+[\d.]+\s+[\d.]+\s+([\d.]+)', content)
          threat_prec = re.search(r'Threat\s+([\d.]+)', content)
          threat_rec  = re.search(r'Threat\s+[\d.]+\s+([\d.]+)', content)
          thresh      = re.search(r'Best Threshold:\s*([\d.]+)', content)
          duration    = re.search(r'Training Duration:\s*([\d.]+)', content)
          min_f1      = float(os.environ.get('MIN_F1_THRESHOLD', '0.70'))

          f1     = float(threat_f1.group(1)) if threat_f1 else 0
          status = '✅ PASS' if f1 >= min_f1 else '❌ FAIL'

          summary = f'''## 🤖 Model Training Results

| Metric | Value |
|--------|-------|
| Status | {status} |
| Threat class F1 | {threat_f1.group(1) if threat_f1 else 'N/A'} |
| Threat precision | {threat_prec.group(1) if threat_prec else 'N/A'} |
| Threat recall | {threat_rec.group(1) if threat_rec else 'N/A'} |
| Best threshold | {thresh.group(1) if thresh else 'N/A'} |
| Min required F1 | {min_f1} |
| Training duration | {duration.group(1) + 's' if duration else 'N/A'} |
'''

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          print('Performance summary written to GitHub Actions job summary')
          "

      - name: Upload MLflow artifacts
        if: steps.check-data.outputs.data_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-${{ github.sha }}
          path: |
            /tmp/mlruns/
            model_output/classification_report.txt
          retention-days: 30

      - name: Upload model artifacts
        if: steps.check-data.outputs.data_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: |
            model_output/pipeline_artifacts_v2.joblib
            model_output/classification_report.txt
          retention-days: 90

