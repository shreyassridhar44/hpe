services:

  # ── Apache Kafka (KRaft mode — Official Apache Image) ──

  kafka:
    image: apache/kafka:3.7.0
    container_name: hpe-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - hpe-network

  # ── Elasticsearch (single-node dev mode) ──
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: hpe-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hpe-network

  # ── Kibana (log visualization) ──
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: hpe-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibana_data:/usr/share/kibana/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hpe-network

  # ── Zeek IDS (reads synthetic PCAP from dataset and writes Zeek logs) ──
  zeek:
    image: zeek/zeek:5.0.5
    container_name: hpe-zeek
    volumes:
      - ./dataset:/dataset:ro
      - ./dataset/zeek:/zeek_out
    command: sh -c "mkdir -p /zeek_out && cd /zeek_out && (zeek -C -r /dataset/conn.pcap || true) && tail -f /dev/null"
    depends_on:
      - elasticsearch
    networks:
      - hpe-network

  # ── Filebeat (Elastic Beats) ──
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: hpe-filebeat
    user: root
    volumes:
      - ./dataset/zeek:/usr/share/filebeat/zeek:ro
      - ./beats/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - elasticsearch
      - zeek
    networks:
      - hpe-network
    command: filebeat -e -c /usr/share/filebeat/filebeat.yml --strict.perms=false

  # ── Elasticsearch to Kafka bridge ──
  es-to-kafka:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hpe-es-to-kafka
    working_dir: /repo
    volumes:
      - .:/repo:ro
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hpe-network
    command: sh -c "sleep 15 && python scripts/es_to_kafka.py --es-url $${ELASTICSEARCH_URL} --kafka-servers $${KAFKA_BOOTSTRAP_SERVERS} --index zeek-conn-* --topic hpe-raw-events --watch --poll-interval 5"
    restart: on-failure

  # ── PostgreSQL (Phase 2 — real DB for Vault dynamic secrets engine) ──
  postgres:
    image: postgres:16-alpine
    container_name: hpe-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=vault-root
      - POSTGRES_PASSWORD=vault-root-secret
      - POSTGRES_DB=hpedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vault-root -d hpedb" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hpe-network

  # ── HashiCorp Vault (server mode — persistent Raft storage) ──
  vault:
    image: hashicorp/vault:1.15.6
    container_name: hpe-vault
    ports:
      - "8200:8200"
      - "8201:8201"
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://vault:8200
      - VAULT_CLUSTER_ADDR=http://vault:8201
      - SKIP_CHOWN=true
      - SKIP_SETCAP=true
    entrypoint: vault
    command: server -config=/vault/config/vault.hcl
    volumes:
      - ./vault/config:/vault/config
      - vault_data:/vault/data
    healthcheck:
      test: [ "CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Initialized|Sealed'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hpe-network

  # ── Vault Init (runs once after vault + postgres are healthy, then exits) ──
  vault-init:
    image: hashicorp/vault:1.15.6
    container_name: hpe-vault-init
    environment:
      - VAULT_ADDR=http://vault:8200
    entrypoint: sh
    command: /vault/init/init-vault.sh
    volumes:
      - ./vault/init:/vault/init
      - vault_data:/vault/data
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - hpe-network
    restart: "no"

  # ── FastAPI Backend ──
  # Phase 3: VAULT_TOKEN removed. Backend authenticates via AppRole using
  # VAULT_ROLE_ID + VAULT_SECRET_ID read from the shared vault_data volume.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hpe-backend
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - VAULT_ADDR=http://vault:8200
      - POSTGRES_URL=postgresql://vault-root:vault-root-secret@postgres:5432/hpedb
      - MODEL_PATH=/app/model_output/pipeline_artifacts_v2.joblib
      - TEST_EVENTS_PATH=/app/model_output/test_events.json
      - PROFILES_PATH=/app/model_output/user_profiles.json
      - ZEEK_LOG_PATH=/app/dataset/zeek-live/conn.log
      # VAULT_TOKEN is intentionally removed in Phase 3.

      # The backend reads role_id + secret_id from /vault/data/.approle_credentials
      # and exchanges them for a short-lived token via AppRole auth.
    volumes:
      - ./model_output:/app/model_output:ro
      - ./dataset:/app/dataset
      - vault_data:/vault/data:ro
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - hpe-network

  # ── Frontend (Vite dev server) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hpe-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - hpe-network

  redis:
    image: redis:7-alpine
    container_name: hpe-redis
    ports:
      - "6379:6379"
    networks:
      - hpe-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Live Replay: Streams dataset conn.log as live traffic ──
  # Reads dataset/zeek/conn.log and writes it line-by-line to
  # dataset/zeek-live/conn.log at a controlled rate.
  # Usage: docker compose --profile live-replay up -d
  replay:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hpe-replay
    working_dir: /repo
    volumes:
      - .:/repo
    command: >
      python scripts/replay_live.py
        --source /repo/dataset/zeek/conn.log
        --output /repo/dataset/zeek-live/conn.log
        --rate ${REPLAY_RATE:-50}
        --loop
    depends_on:
      - elasticsearch
    networks:
      - hpe-network
    profiles:
      - live-replay

  # ── Filebeat for Live Replay (tail mode → Elasticsearch) ──
  # Watches dataset/zeek-live/conn.log for new lines and ships to ES.
  # Pair with the 'replay' service and 'es-to-kafka' to get events into Kafka.
  # Usage: docker compose --profile live-replay up -d
  filebeat-live:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: hpe-filebeat-live
    user: root
    volumes:
      - ./dataset/zeek-live:/usr/share/filebeat/zeek-live:ro
      - ./beats/filebeat-live.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - elasticsearch
      - replay
    networks:
      - hpe-network
    command: filebeat -e -c /usr/share/filebeat/filebeat.yml --strict.perms=false
    profiles:
      - live-replay

  # ── Filebeat Direct-to-Kafka (tail mode → Kafka, bypass ES) ──
  # Alternative: sends Zeek events straight to Kafka without ES bridge.
  # Usage: docker compose --profile live-kafka up -d
  filebeat-kafka:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: hpe-filebeat-kafka
    user: root
    volumes:
      - ./dataset/zeek-live:/usr/share/filebeat/zeek-live:ro
      - ./beats/filebeat-kafka.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hpe-network
    command: filebeat -e -c /usr/share/filebeat/filebeat.yml --strict.perms=false
    profiles:
      - live-kafka

  # ── Public Login Portal (Served via Nginx) ──
  login-portal:
    image: nginx:alpine
    container_name: hpe-login-portal
    ports:
      - "8080:80"
    volumes:
      - ./public-login:/usr/share/nginx/html:ro
      - ./public-login/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - hpe-network
    profiles:
      - live-replay

  adminer:
    image: adminer
    container_name: hpe-adminer
    ports:
      - "9090:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - hpe-network
    profiles:
      - live-replay

  # ── Ngrok Tunnel (Unified Public Access) ──
  ngrok:
    image: ngrok/ngrok:latest
    container_name: hpe-ngrok
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    command:
      - start
      - --all
      - --config
      - /etc/ngrok.yml
    ports:
      - "4040:4040"
    depends_on:
      - login-portal
      - backend
    networks:
      - hpe-network
    profiles:
      - live-replay

volumes:
  kafka_data:
  es_data:
  kibana_data:
  vault_data:
  postgres_data:

networks:
  hpe-network:
    driver: bridge
